name: Entropy Publisher Mock CI and Container Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: entropy-publisher-mock
  EXPECTED_INCREMENT_PS: "5430000000"
  EXPECTED_DISTRIBUTION: "exponential"

concurrency:
  group: entropy-publisher-mock-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage.xml

      - name: Run smoke test (dry-run publish)
        run: |
          python entropy-publisher-mock.py \
            --dry-run \
            --max-events 4 \
            --channels 1-2 \
            --rate 0

      - name: Validate container defaults
        run: |
          docker build --tag entropy-publisher-mock:ci .

          actual_cmd="$(docker image inspect entropy-publisher-mock:ci --format '{{json .Config.Cmd}}')"
          expected_cmd='["python","entropy-publisher-mock.py","--host","mosquitto","--port","1883","--channels","1-2","--rate","184","--distribution","${{ env.EXPECTED_DISTRIBUTION }}","--increment-ps","${{ env.EXPECTED_INCREMENT_PS }}"]'

          if [[ "$actual_cmd" != "$expected_cmd" ]]; then
            echo "unexpected image CMD"
            echo "actual:   $actual_cmd"
            echo "expected: $expected_cmd"
            exit 1
          fi

      - name: Smoke test container image
        run: |
          docker run --rm entropy-publisher-mock:ci \
            python entropy-publisher-mock.py \
            --dry-run \
            --max-events 4 \
            --channels 1-2 \
            --rate 0 \
            --distribution "${{ env.EXPECTED_DISTRIBUTION }}" \
            --increment-ps "${{ env.EXPECTED_INCREMENT_PS }}"

  docker:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select target platforms
        id: platforms
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "needs_qemu=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "needs_qemu=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.platforms.outputs.needs_qemu == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.value }}
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || false }}
          sbom: ${{ github.event_name != 'pull_request' }}
